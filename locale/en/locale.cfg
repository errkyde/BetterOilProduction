[item-description]
better-pumpjack-mk2=An advanced pumpjack that extracts resources with improved efficiency and speed.
better-pumpjack-mk3=The most advanced pumpjack, capable of extracting resources at the highest rates with minimal downtime.
better-pumpjack-eco=An eco-friendly pumpjack designed to minimize resource depletion while maintaining extraction efficiency.
bop-hydrocarbon-chunk=A dense chunk of carbon-rich asteroid material. Combine with water in a Hydrocarbon Synthesizer to produce synthetic crude.
bop-synthetic-crude=Solidified synthetic crude processed from hydrocarbon chunks in space. Heat it in a chemical plant on the planet to yield crude oil.
bop-hydrocarbon-synthesizer=A space-rated assembling machine that combines hydrocarbon chunks with water to produce transportable synthetic crude.

