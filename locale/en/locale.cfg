[technology-description]
advanced-pumpjacks=Unlocks the ability to build advanced pumpjacks that extract resources more efficiently.
advanced-pumpjacks-mk3=Unlocks the ability to build the most advanced pumpjacks, which provide the highest extraction rates and efficiency.
eco-pumpjacks=Unlocks the ability to build pumpjacks with minimal depletion of the resource, ensuring sustainable extraction practices.
bop-space-oil-synthesis=Unlocks the Hydrocarbon Synthesizer for space platforms. Crush carbonic asteroids into hydrocarbon chunks, synthesise them with water into synthetic crude, then heat the crude in a chemical plant back on the planet to yield crude oil.

